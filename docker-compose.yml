services:
  ai:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-server-template:local
    restart: always
    user: "1001:1001"
    environment:
      NODE_ENV: production
      PORT: "3100"
      HOME: /home/claude
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-claude}
      CLAUDE_BIN: /opt/claude/bin/claude
      CLAUDE_TIMEOUT_MS: "60000"
      CLAUDE_DEFAULT_MAX_TURNS: "1"
      CODEX_BIN: /opt/codex/bin/codex
      CODEX_TIMEOUT_MS: "60000"
      CODEX_DEFAULT_MAX_TURNS: "1"
      CODEX_SANDBOX: read-only
      LOG_LEVEL: info
      API_TOKEN: ${API_TOKEN}
      RATE_LIMIT_PER_MIN: "60"
      MAX_CONCURRENT_CLAUDE: "3"
      MAX_QUEUED_CLAUDE: "10"
      MAX_CONCURRENT_CODEX: "3"
      MAX_QUEUED_CODEX: "10"
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      # claude writes ephemeral state under $HOME (e.g. .npm cache); keep it
      # in RAM so read_only stays effective without polluting the image.
      - /home/claude/.cache:size=64M,mode=0700,uid=1001,gid=1001
      - /home/claude/.npm:size=32M,mode=0700,uid=1001,gid=1001
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 200
    volumes:
      # Host-installed claude CLI (self-contained ELF binary), read-only.
      - /home/agent/.local/share/claude:/opt/claude/share:ro
      # Symlink-style entry point so CLAUDE_BIN stays version-agnostic.
      - /home/agent/.local/bin/claude:/opt/claude/bin/claude:ro
      # Claude credentials & state. RW because the CLI refreshes OAuth tokens.
      - /home/agent/.claude:/home/claude/.claude
      # Sibling config file claude reads/writes alongside ~/.claude/.
      - /home/agent/.claude.json:/home/claude/.claude.json
      # Codex CLI (optional). Comment out the next two mounts if you don't
      # want to serve `provider: "codex"` requests — the server starts fine
      # without them, only the codex path becomes unusable.
      - /home/agent/.local/bin/codex:/opt/codex/bin/codex:ro
      # Codex credentials & state. RW because the CLI refreshes OAuth tokens.
      - /home/agent/.codex:/home/claude/.codex
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_default

      - traefik.http.routers.ai.rule=Host(`ai.takamoa.com`)
      - traefik.http.routers.ai.entrypoints=web,websecure
      - traefik.http.routers.ai.tls=true
      - traefik.http.routers.ai.tls.certresolver=mytlschallenge

      - traefik.http.services.ai.loadbalancer.server.port=3100

      - traefik.http.middlewares.ai.headers.SSLRedirect=true
      - traefik.http.middlewares.ai.headers.STSSeconds=315360000
      - traefik.http.middlewares.ai.headers.browserXSSFilter=true
      - traefik.http.middlewares.ai.headers.contentTypeNosniff=true
      - traefik.http.middlewares.ai.headers.forceSTSHeader=true
      - traefik.http.middlewares.ai.headers.SSLHost=ai.takamoa.com
      - traefik.http.middlewares.ai.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.ai.headers.STSPreload=true
      - traefik.http.routers.ai.middlewares=ai@docker

networks:
  traefik:
    name: n8n_default
    external: true
